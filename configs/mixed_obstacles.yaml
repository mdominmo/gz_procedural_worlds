world:
  name: "procedural_mixed"
  seed: 300
  description: "Mixed environment with trees, walls, barriers and people"

area:
  size_x: 100.0
  size_y: 100.0
  ground_plane_size: 100

spawn_zone:
  center: [0.0, 0.0]
  radius: 5.0

spherical_coordinates:
  latitude_deg: 52.11486
  longitude_deg: -6.613
  elevation: 2
  heading_deg: 0

connectivity:
  enabled: true
  check_altitude: 3.0
  safety_margin: 1.5
  start: [0.0, 0.0]
  goals:
    - [40.0, 40.0]
    - [-40.0, -40.0]
    - [40.0, -40.0]
    - [-40.0, 40.0]
  max_removal_iterations: 60

obstacles:
  - model: "Pine Tree"
    count: 25
    distribution: "clustered"
    min_spacing: 3.0
    height: 8.0
    yaw_random: true
    area_bounds:
      x_min: -45.0
      x_max: 45.0
      y_min: -45.0
      y_max: 45.0

  - model: "wall_segment"
    count: 8
    distribution: "random"
    min_spacing: 5.0
    height: 2.5
    yaw_random: true
    area_bounds:
      x_min: -40.0
      x_max: 40.0
      y_min: -40.0
      y_max: 40.0

  - model: "concrete_barrier"
    count: 10
    distribution: "perimeter"
    min_spacing: 3.0
    height: 1.0
    perimeter:
      offset: 8.0

  - model: "pole"
    count: 6
    distribution: "random"
    min_spacing: 8.0
    height: 4.0

  - model: "Standing person"
    count: 4
    distribution: "random"
    min_spacing: 5.0
    height: 1.8
    yaw_random: true

lighting:
  sun_direction: [-0.5, 0.1, -0.9]
  sun_intensity: 1.0
  ambient: [0.4, 0.4, 0.4, 1.0]
